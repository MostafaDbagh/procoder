  <!-- Arms -->
  <path d="M238 295 Q220 310 230 340" stroke="#E8C9A0" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M282 295 Q310 320 330 330" stroke="#E8C9A0" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- Legs -->
  <rect x="243" y="338" rx="5" width="14" height="48" fill="#4A5568" opacity="0.3"/>
  <rect x="264" y="338" rx="5" width="14" height="48" fill="#4A5568" opacity="0.3"/>

  <!-- Kid 2 (center, sitting) -->
  <circle cx="380" cy="230" r="33" fill="#D4B89C" opacity="0.6"/>
  <!-- Curly hair -->
  <circle cx="365" cy="210" r="11" fill="#3A2A18" opacity="0.4"/>
  <circle cx="380" cy="203" r="12" fill="#3A2A18" opacity="0.4"/>
  <circle cx="395" cy="210" r="11" fill="#3A2A18" opacity="0.4"/>
  <circle cx="358" cy="220" r="9" fill="#3A2A18" opacity="0.4"/>
  <circle cx="402" cy="220" r="9" fill="#3A2A18" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="370" cy="235" r="3" fill="#4A5568" opacity="0.55"/>
  <circle cx="390" cy="235" r="3" fill="#4A5568" opacity="0.55"/>
  <!-- Smile -->
  <path d="M372 247 Q380 255 388 247" stroke="#8B6E50" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>
  <!-- Body -->
  <rect x="358" y="263" rx="10" width="44" height="65" fill="#5CC4A0" opacity="0.3"/>
  <!-- Arms -->
  <path d="M358 283 Q340 300 340 335" stroke="#D4B89C" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M402 283 Q420 300 420 335" stroke="#D4B89C" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Legs -->
  <rect x="363" y="326" rx="5" width="14" height="56" fill="#8B7BC8" opacity="0.25"/>
  <rect x="384" y="326" rx="5" width="14" height="56" fill="#8B7BC8" opacity="0.25"/>

  <!-- Book on desk -->
  <rect x="210" y="358" rx="4" width="55" height="24" fill="#C88DA8" opacity="0.3" transform="rotate(-5, 237, 370)"/>
  <rect x="212" y="360" rx="3" width="25" height="20" fill="#F7FAFC" opacity="0.5" transform="rotate(-5, 237, 370)"/>
  <line x1="237" y1="360" x2="237" y2="380" stroke="#C88DA8" stroke-width="1.5" opacity="0.35" transform="rotate(-5, 237, 370)"/>

  <!-- Pencil on desk -->
  <rect x="520" y="368" rx="2" width="55" height="7" fill="#D4A46A" opacity="0.35" transform="rotate(-8, 548, 372)"/>
  <polygon points="520,368 516,371 520,375" fill="#D4A46A" opacity="0.4" transform="rotate(-8, 548, 372)"/>

  <!-- Floating elements -->
  <!-- Stars -->
  <path d="M150 150 L155 140 L160 150 L170 155 L160 160 L155 170 L150 160 L140 155Z" fill="#D4A46A" opacity="0.25"/>
  <path d="M650 120 L654 112 L658 120 L666 124 L658 128 L654 136 L650 128 L642 124Z" fill="#D4A46A" opacity="0.2"/>
  <path d="M700 280 L703 274 L706 280 L712 283 L706 286 L703 292 L700 286 L694 283Z" fill="#8B7BC8" opacity="0.2"/>
  <path d="M130 320 L133 314 L136 320 L142 323 L136 326 L133 332 L130 326 L124 323Z" fill="#5B7FD6" opacity="0.2"/>

  <!-- Floating code symbols -->
  <text x="120" y="250" font-family="monospace" font-size="22" fill="#8B7BC8" opacity="0.2">+</text>
  <text x="680" y="200" font-family="monospace" font-size="26" fill="#5CC4A0" opacity="0.2">=</text>
  <text x="160" y="420" font-family="monospace" font-size="20" fill="#D4A46A" opacity="0.2">%</text>
  <text x="670" y="380" font-family="monospace" font-size="18" fill="#5B7FD6" opacity="0.2">&lt;/&gt;</text>

  <!-- Lightbulb -->
  <ellipse cx="440" cy="120" rx="18" ry="22" fill="#D4A46A" opacity="0.2"/>
  <rect x="435" y="140" width="10" height="7" rx="2" fill="#D4A46A" opacity="0.2"/>
  <line x1="440" y1="88" x2="440" y2="95" stroke="#D4A46A" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="460" y1="102" x2="465" y2="98" stroke="#D4A46A" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="420" y1="102" x2="415" y2="98" stroke="#D4A46A" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7BC8"/>
      <stop offset="50%" stop-color="#5B7FD6"/>
      <stop offset="100%" stop-color="#5CC4A0"/>
    </linearGradient>
  </defs>
