  <circle cx="547" cy="205" r="10" stroke="#8B7BC8" stroke-width="1.8" fill="none" opacity="0.4"/>
  <circle cx="573" cy="205" r="10" stroke="#8B7BC8" stroke-width="1.8" fill="none" opacity="0.4"/>
  <line x1="557" y1="205" x2="563" y2="205" stroke="#8B7BC8" stroke-width="1.8" opacity="0.4"/>
