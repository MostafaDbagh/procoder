  <!-- Legs -->
  <rect x="540" y="318" rx="6" width="16" height="72" fill="#4A5568" opacity="0.35"/>
  <rect x="566" y="318" rx="6" width="16" height="72" fill="#4A5568" opacity="0.35"/>
  <!-- Shoes -->
  <ellipse cx="548" cy="392" rx="13" ry="7" fill="#C88DA8" opacity="0.4"/>
  <ellipse cx="574" cy="392" rx="13" ry="7" fill="#C88DA8" opacity="0.4"/>

