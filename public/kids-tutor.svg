  <path d="M225 232 Q225 200 260 195 Q295 200 295 232" fill="#3A3040" opacity="0.4"/>
  <ellipse cx="260" cy="205" rx="37" ry="16" fill="#3A3040" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="248" cy="245" r="3" fill="#4A5568" opacity="0.55"/>
  <circle cx="272" cy="245" r="3" fill="#4A5568" opacity="0.55"/>
  <!-- Smile -->
  <path d="M250 256 Q260 264 270 256" stroke="#A0734A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>
